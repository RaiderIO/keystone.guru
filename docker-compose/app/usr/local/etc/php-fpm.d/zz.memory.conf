; /usr/local/etc/php-fpm.d/zz.memory.conf
; Caps web request memory only (CLI/artisan/horizon/octane keep memory_limit from conf.d/uploads.ini).
; A php-fpm worker ballooned to 4GB and OOM-crashed the whole WSL VM; this makes the offending
; request die with a loggable "Allowed memory size exhausted" fatal instead.
[www]
php_admin_value[memory_limit] = 512M
