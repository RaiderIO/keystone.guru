name: "PHP CI Setup"
description: "Common setup for Keystone.guru CI"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, intl, pdo_mysql, bcmath, gd
        coverage: none

    - name: Cache composer
      uses: actions/cache@v4
      with:
        path: ~/.composer/cache/files
        key: composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-

    - name: Install system clients (mysql + redis CLI)
      run: |
        sudo apt-get update
        sudo apt-get install -y default-mysql-client redis-tools lua5.3 liblua5.3-dev
      shell: bash

    - name: Build PHP Lua extension
      run: |
        sudo ln -sfn /usr/include/lua5.3 /usr/include/lua
        sudo cp /usr/lib/*-linux-gnu/liblua5.3.a /usr/lib/liblua.a 2>/dev/null || true
        sudo cp /usr/lib/*-linux-gnu/liblua5.3.so.0.0.0 /usr/lib/liblua.so 2>/dev/null || true
        sudo ln -f /usr/include/lua5.3/lua.h /usr/include/lauxlib.h || true
        sudo ln -f /usr/include/lua5.3/lua.h /usr/include/lua.h || true
        sudo ln -f /usr/include/lua5.3/lua.h /usr/include/luaconf.h || true
        git clone https://github.com/Wotuu/php-lua.git /tmp/php-lua
        cd /tmp/php-lua
        phpize
        ./configure
        make -j$(nproc)
        sudo make install
        echo "extension=lua.so" | sudo tee "$(php -r 'echo PHP_CONFIG_FILE_SCAN_DIR;')/99-lua.ini"
        php -m | grep -i lua
        unzip storage/lua/LuaBitOp-1.0.3.zip -d /tmp
        cd /tmp/LuaBitOp-1.0.3
        make -j$(nproc)
        sudo mkdir -p /usr/lib/lua/5.3/
        sudo cp bit.so /usr/lib/lua/5.3/
      shell: bash

    - name: Install PHP dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader
      shell: bash

    - name: Compute git version and save to file
      run: echo -n "$(git rev-parse HEAD)" >> version
      shell: bash

    - name: Prepare .env for CI
      run: |
        cp .env.ci.example .env || true
        php artisan key:generate --force -v
      shell: bash

    - name: Migrate & seed
      run: |
        php artisan migrate --database=migrate --force
        php artisan migrate --database=combatlog --path=database/migrations_combatlog --force
        php artisan db:seed --database=migrate --force -v
      shell: bash
