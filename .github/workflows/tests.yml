name: Tests & Static Analysis

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development
      - master

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/_ci-base.yml
    with:
      mode: tests
    secrets: inherit

  js-tests:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
