name: PHPStan

# The push trigger seeds branch-scoped caches from master (composer + Lua ext + cargo via
# php-ci-setup — the same keys the php-tests shards restore); without it every new PR's first
# run is fully cold (#3612).
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  phpstan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout for local actions
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Common PHP/Laravel setup
        uses: ./.github/actions/php-ci-setup
        with:
          run-migrations: 'false'

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon --memory-limit=1G
