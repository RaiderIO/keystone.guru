name: Release Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 868970774940.dkr.ecr.us-east-1.amazonaws.com
  NODE_VERSION: '24'

jobs:
  # Frontend assets are keyed by the release tag (e.g. v15.2.2) so they land at
  # compiled/<tag>/... — matching the `version` file baked into the app image.
  # Runs in parallel with the image build; deploy jobs wait on it.
  build-assets:
    name: Build & Upload Frontend Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build assets
        # NOTE: pass flags *after* `--` so they reach your npm script
        env:
          ASSETS_BASE_URL: https://assets.keystone.guru/
        run: npm --output_version=${{ github.ref_name }} run production

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868970774940:role/ksg-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI v2
        uses: unfor19/install-aws-cli-action@v1

      - name: Upload JS
        run: |
          aws s3 cp public/js s3://${{ secrets.S3_BUCKET }}/compiled/${{ github.ref_name }}/js \
            --recursive \
            --cache-control "public,max-age=31536000,immutable" \
            --no-progress
      - name: Upload CSS
        run: |
          aws s3 cp public/css s3://${{ secrets.S3_BUCKET }}/compiled/${{ github.ref_name }}/css \
            --recursive \
            --cache-control "public,max-age=31536000,immutable" \
            --no-progress
      - name: Upload Webfonts
        run: |
          aws s3 cp public/webfonts s3://${{ secrets.S3_BUCKET }}/compiled/${{ github.ref_name }}/webfonts \
            --recursive \
            --cache-control "public,max-age=31536000,immutable" \
            --no-progress

  # Map context JS is generated from the DB/seeders and is also keyed by the
  # `version` file. We override that file with the release tag so the output
  # lands at compiled/<tag>/mapcontext/... matching the image. Runs in parallel.
  build-map-context:
    name: Generate & Upload Map Context
    runs-on: ubuntu-latest

    steps:
      - name: Checkout for local actions
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Start services
        run: docker compose -f docker-compose.ci.yml up -d --wait

      - name: Common PHP/Laravel setup
        uses: ./.github/actions/php-ci-setup

      - name: Key map context by the release tag
        run: printf '%s' "${{ github.ref_name }}" > version

      - name: Generate Map Context JS
        run: |
          mkdir -p storage/mapcontext
          php artisan make:mapcontextstatic --output=storage/mapcontext
          php artisan make:mapcontextdungeon --output=storage/mapcontext
          php artisan make:mapcontextmappingversion --output=storage/mapcontext
          ls -la storage/mapcontext

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868970774940:role/ksg-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1

      - name: Upload Map Context JS files
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp storage/mapcontext "s3://${S3_BUCKET}/compiled" \
            --recursive \
            --cache-control "public,max-age=31536000,immutable" \
            --no-progress

  # Builds app / worker / cron in parallel matrix legs (each a fresh runner).
  #
  # Only the app base image (docker-compose/app) gets buildx + GHA layer caching:
  # it's the expensive, self-contained build (rust/PHP-extension toolchain, ~5.4min)
  # and every FROM in it resolves to a public registry image, which the buildx
  # docker-container driver (required for --cache-to type=gha) can reach.
  #
  # The worker/cron base images (docker-compose/app-worker, docker-compose/cron) and
  # all three production images instead FROM a *locally* tagged image (keystone.guru-app,
  # or that leg's own base) — the docker-container builder cannot see the host docker
  # daemon's local image store, so those stay on the plain `docker build` (default
  # driver, shares the daemon). They're cheap layers (apt-get + one binary / a git
  # clone), so there's little to gain from caching them anyway.
  build-push-images:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: app
            base_tag: keystone.guru-app
            needs_own_base_build: false
            prod_context: docker-compose/app-aws
            ecr_repos: "ksg-php-fpm ksg-reverb ksg-swoole"
          # Puppeteer/Chrome live only in this image (docker-compose/app-worker), so the
          # thumbnail-generation queue workers get a browser; the app image above doesn't.
          - image: worker
            base_tag: keystone.guru-worker
            needs_own_base_build: true
            base_context: docker-compose/app-worker
            prod_context: docker-compose/app-worker-aws
            ecr_repos: "ksg-queue-worker"
          - image: cron
            base_tag: keystone.guru-cron
            needs_own_base_build: true
            base_context: docker-compose/cron
            prod_context: docker-compose/cron-aws
            ecr_repos: "ksg-cron"

    name: Build & Push Release Images (${{ matrix.image }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868970774940:role/ksg-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The base image build substitutes GIT_TOKEN into the composer auth.json.
      # All composer repositories are public, so the built-in token is sufficient.
      - name: Prepare base image build context
        run: echo "GIT_TOKEN=${{ secrets.GITHUB_TOKEN }}" > docker-compose/app/.env

      # Built on every leg (not just the app leg): the worker/cron base Dockerfiles
      # both FROM keystone.guru-app (see their Dockerfiles), so it has to exist
      # locally on those runners too. Scoped "app-base" on all three legs so they
      # share one GHA cache entry instead of each rebuilding it cold.
      - name: Build app base image
        run: |
          docker buildx build \
            --cache-from type=gha,scope=app-base \
            --cache-to type=gha,mode=max,scope=app-base \
            --load \
            -t keystone.guru-app \
            docker-compose/app

      - name: Build base ${{ matrix.image }} image
        if: matrix.needs_own_base_build
        run: docker build -t ${{ matrix.base_tag }} ${{ matrix.base_context }}

      # GIT_REF pins the in-image checkout to the released tag for reproducibility.
      # No --no-cache here: on a fresh runner there's nothing to invalidate, and the
      # Dockerfile's `git clone --depth 1 --branch <GIT_REF>` self-invalidates every
      # release regardless.
      - name: Build production ${{ matrix.image }} image
        run: |
          docker build \
            --build-arg STAGE=production \
            --build-arg GIT_REF=${{ github.ref_name }} \
            -t ${{ matrix.base_tag }}:${{ github.ref_name }} \
            ${{ matrix.prod_context }}

      - name: Tag & push ${{ matrix.image }} image(s) to ECR
        run: |
          for repo in ${{ matrix.ecr_repos }}; do
            docker tag ${{ matrix.base_tag }}:${{ github.ref_name }} \
              "${ECR_REGISTRY}/${repo}:${{ github.ref_name }}"
            docker push "${ECR_REGISTRY}/${repo}:${{ github.ref_name }}"
          done

  # Staging deploys automatically once the release images, frontend assets and
  # map context all exist for the tag (gated via `needs` below). The
  # actual deploy runs in RaiderIO/keystoneguru-infra (it owns the CDK app); we
  # trigger it via repository_dispatch with the released version. Cross-repo
  # dispatch needs a token with access to that repo, stored as the
  # INFRA_DISPATCH_TOKEN secret (the default GITHUB_TOKEN cannot dispatch
  # cross-repo).
  deploy-staging:
    name: Deploy to Staging
    needs: [build-push-images, build-assets, build-map-context]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch staging deploy to keystoneguru-infra
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${INFRA_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/RaiderIO/keystoneguru-infra/dispatches \
            -d "$(jq -nc --arg v "${{ github.ref_name }}" \
              '{event_type:"deploy-staging", client_payload:{version:$v}}')"

  # Production is gated by the `production` GitHub Environment: configure a
  # required reviewer on that environment so this job blocks until a human
  # approves (after they have validated staging). On approval it dispatches the
  # same infra deploy for the production stage.
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Dispatch production deploy to keystoneguru-infra
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${INFRA_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/RaiderIO/keystoneguru-infra/dispatches \
            -d "$(jq -nc --arg v "${{ github.ref_name }}" \
              '{event_type:"deploy-production", client_payload:{version:$v}}')"
